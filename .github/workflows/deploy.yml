name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/locanda
            git pull origin main
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            chmod -R 775 storage bootstrap/cache

            # Aggiorna gli asset in public_html
            PUBHTML=~/domains/rosybrown-boar-509699.hostingersite.com/public_html
            cp -r ~/locanda/public/css $PUBHTML/
            cp -r ~/locanda/public/js $PUBHTML/
            cp -r ~/locanda/public/images $PUBHTML/
            cp ~/locanda/public/favicon.ico $PUBHTML/
            cp ~/locanda/public/sitemap.xml $PUBHTML/
            cp ~/locanda/public/robots.txt $PUBHTML/

            echo "Deploy completato."
